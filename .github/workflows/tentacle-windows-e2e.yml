name: Tentacle Windows E2E

# Windows runners are billed at 2x on GHA; running this on every PR would burn
# most of the Team-plan 3000-minute budget. Run nightly + on merge to main, and
# expose workflow_dispatch so a developer can trigger an on-demand Windows run
# before a risky PR.
#
# Single-job, multi-step layout (vs tests.yml's one-job-per-project) is a
# deliberate cost optimization — splitting into separate jobs would spin up an
# additional VM per project (2x billing applies per VM). The trade-off is
# sequential execution + slightly muddier failure attribution; the per-step
# name + per-step filter input are how we keep both clear.
#
# OS matrix: the job fans out over windows-2019 AND windows-2022 to prove the
# self-upgrade across Windows versions (older SCM / TLS defaults on 2019). This
# multiplies the VM minutes by the matrix size — acceptable because the run is
# nightly/dispatch-gated, not per-PR.

on:
  schedule:
    - cron: "0 9 * * *"    # 09:00 UTC daily
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      test_filter:
        description: "xUnit --filter for the Squid.Tentacle.Tests step (agent-binary Windows E2E)"
        required: false
        default: "Category=WindowsTentacleE2E"
      upgrade_test_filter:
        description: "xUnit --filter for the Squid.WindowsTentacleE2ETests step (defaults to wrapper + service categories)"
        required: false
        default: "Category=WindowsUpgradeWrapperE2E|Category=WindowsUpgradeServiceE2E|Category=WindowsUpgradeShaVerifyE2E|Category=WindowsServiceHostE2E|Category=StubSquidServerE2E|Category=TentacleRegisterE2E|Category=TentacleDeployE2E|Category=TentacleUpgradeE2E|Category=TentacleInstallScriptE2E|Category=TentacleMultiInstanceE2E|Category=TentacleCapabilitiesE2E|Category=TentacleUpgradeLifecycleE2E|Category=TentacleDiagnosticE2E|Category=WindowsTentacleBinaryE2E|Category=IISDeployE2E"

permissions:
  contents: read

jobs:
  windows-tentacle-e2e:
    name: Windows Tentacle End-to-End (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      # Prove the upgrade across Windows versions: 2019 (older SCM / TLS defaults)
      # AND 2022. fail-fast: false so one OS's failure doesn't mask the other's result.
      fail-fast: false
      matrix:
        os: [windows-2019, windows-2022]
    env:
      NUGET_CONFIG: ${{ github.workspace }}/NuGet.Config

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Disable unreachable NuGet source
        shell: pwsh
        run: dotnet nuget disable source SJ.Nuget --configfile "$env:NUGET_CONFIG"

      - name: Confirm PowerShell runtimes present
        shell: pwsh
        run: |
          Write-Host "pwsh: $(pwsh -NoLogo -Command 'Write-Output $PSVersionTable.PSVersion')"
          Write-Host "powershell: $(powershell -NoLogo -Command 'Write-Output $PSVersionTable.PSVersion')"

      - name: Restore Squid.Tentacle.Tests
        shell: pwsh
        run: dotnet restore tests/Squid.Tentacle.Tests/Squid.Tentacle.Tests.csproj --configfile "$env:NUGET_CONFIG"

      - name: Run Squid.Tentacle.Tests
        shell: pwsh
        run: |
          $filter = if ("${{ github.event.inputs.test_filter }}") { "${{ github.event.inputs.test_filter }}" } else { "Category=WindowsTentacleE2E" }
          dotnet test tests/Squid.Tentacle.Tests/Squid.Tentacle.Tests.csproj `
            --configuration Release --no-restore `
            --filter $filter `
            --logger "console;verbosity=normal"

      - name: Install IIS feature (Web-WebServer + auth modules + Management tools)
        # Required by Category=IISDeployE2E. Other categories don't need IIS but installing it
        # is cheap on `windows-latest` (~1m) and idempotent, so we always install rather than
        # gating on category. The IIS tests themselves probe `Get-WindowsFeature Web-WebServer`
        # before exercising the metabase so a future split into category-conditional install
        # is mechanical.
        #
        # Auth modules (Phase 3): `Web-Basic-Auth` and `Web-Windows-Auth` are NOT part of the
        # base `Web-WebServer` install. Without them, `appcmd.exe set config /section:basicAuthentication`
        # fails with "the configuration section 'basicAuthentication' cannot be read because it
        # is missing a section declaration" — same for windowsAuthentication. Anonymous auth
        # comes with the base install.
        shell: pwsh
        run: |
          Install-WindowsFeature -Name Web-WebServer,Web-Mgmt-Console,Web-Basic-Auth,Web-Windows-Auth -IncludeManagementTools
          Get-WindowsFeature Web-WebServer, Web-Basic-Auth, Web-Windows-Auth | Format-Table -Property Name, InstallState, DisplayName

      - name: Install Microsoft.Web.Xdt (XDT engine for Phase 7 ConfigurationTransforms)
        # The Phase 7 IIS deploy script invokes Microsoft.Web.XmlTransform for XDT transforms.
        # `windows-latest` has VS Build Tools pre-installed but the DLL is not GAC-resident
        # by default. We populate the NuGet global cache so the PS1's probe lookup
        # (`~/.nuget/packages/microsoft.web.xdt/*/lib/...`) resolves the DLL.
        shell: pwsh
        run: |
          $tempProj = "$env:RUNNER_TEMP\xdt-installer"
          New-Item -ItemType Directory -Force -Path $tempProj | Out-Null
          Push-Location $tempProj
          dotnet new classlib -n XdtInstaller --force | Out-Null
          Set-Location XdtInstaller
          dotnet add package Microsoft.Web.Xdt --version 3.0.0
          dotnet restore
          Pop-Location

          $dll = Get-ChildItem -Path "$env:USERPROFILE\.nuget\packages\microsoft.web.xdt" -Recurse -Filter "Microsoft.Web.XmlTransform.dll" -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($dll) {
            Write-Host "Microsoft.Web.XmlTransform.dll available at: $($dll.FullName)"
          } else {
            Write-Warning "Microsoft.Web.XmlTransform.dll NOT found in NuGet global cache — Phase 7 XDT real-host tests will skip."
          }

      - name: Restore Squid.WindowsTentacleE2ETests
        shell: pwsh
        run: dotnet restore tests/Squid.WindowsTentacleE2ETests/Squid.WindowsTentacleE2ETests.csproj --configfile "$env:NUGET_CONFIG"

      - name: Run Squid.WindowsTentacleE2ETests
        shell: pwsh
        run: |
          $filter = if ("${{ github.event.inputs.upgrade_test_filter }}") { "${{ github.event.inputs.upgrade_test_filter }}" } else { "Category=WindowsUpgradeWrapperE2E|Category=WindowsUpgradeServiceE2E|Category=WindowsUpgradeShaVerifyE2E|Category=WindowsServiceHostE2E|Category=StubSquidServerE2E|Category=TentacleRegisterE2E|Category=TentacleDeployE2E|Category=TentacleUpgradeE2E|Category=TentacleInstallScriptE2E|Category=TentacleMultiInstanceE2E|Category=TentacleCapabilitiesE2E|Category=TentacleUpgradeLifecycleE2E|Category=TentacleDiagnosticE2E|Category=WindowsTentacleBinaryE2E|Category=IISDeployE2E" }
          dotnet test tests/Squid.WindowsTentacleE2ETests/Squid.WindowsTentacleE2ETests.csproj `
            --configuration Release --no-restore `
            --filter $filter `
            --logger "console;verbosity=normal"

      - name: Capture IIS metabase state on failure
        if: failure()
        shell: pwsh
        run: |
          Import-Module WebAdministration -ErrorAction SilentlyContinue
          Write-Host "=== Sites ==="
          Get-Website | Format-Table -Property Name, ID, State, PhysicalPath | Out-String
          Write-Host "=== AppPools ==="
          Get-WebAppPool | Format-Table -Property Name, State | Out-String
          Write-Host "=== Bindings ==="
          Get-WebBinding | Format-Table -Property protocol, bindingInformation, sslFlags | Out-String
