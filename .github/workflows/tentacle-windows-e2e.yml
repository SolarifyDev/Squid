name: Tentacle Windows E2E

# Windows runners are billed at 2x on GHA; running this on every PR would burn
# most of the Team-plan 3000-minute budget. Run nightly + on merge to main, and
# expose workflow_dispatch so a developer can trigger an on-demand Windows run
# before a risky PR.
#
# Single-job, multi-step layout (vs tests.yml's one-job-per-project) is a
# deliberate cost optimization — splitting into separate jobs would spin up an
# additional windows-latest VM per project (2x billing applies per VM). The
# trade-off is sequential execution + slightly muddier failure attribution;
# the per-step name + per-step filter input are how we keep both clear.

on:
  schedule:
    - cron: "0 9 * * *"    # 09:00 UTC daily
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      test_filter:
        description: "xUnit --filter for the Squid.Tentacle.Tests step (agent-binary Windows E2E)"
        required: false
        default: "Category=WindowsTentacleE2E"
      upgrade_test_filter:
        description: "xUnit --filter for the Squid.WindowsUpgradeE2ETests step (defaults to wrapper + service categories)"
        required: false
        default: "Category=WindowsUpgradeWrapperE2E|Category=WindowsUpgradeServiceE2E|Category=WindowsUpgradeShaVerifyE2E|Category=WindowsServiceHostE2E|Category=StubSquidServerE2E|Category=TentacleRegisterE2E|Category=TentacleDeployE2E"

permissions:
  contents: read

jobs:
  windows-tentacle-e2e:
    name: Windows Tentacle End-to-End
    runs-on: windows-latest
    env:
      NUGET_CONFIG: ${{ github.workspace }}/NuGet.Config

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Disable unreachable NuGet source
        shell: pwsh
        run: dotnet nuget disable source SJ.Nuget --configfile "$env:NUGET_CONFIG"

      - name: Confirm PowerShell runtimes present
        shell: pwsh
        run: |
          Write-Host "pwsh: $(pwsh -NoLogo -Command 'Write-Output $PSVersionTable.PSVersion')"
          Write-Host "powershell: $(powershell -NoLogo -Command 'Write-Output $PSVersionTable.PSVersion')"

      - name: Restore Squid.Tentacle.Tests
        shell: pwsh
        run: dotnet restore tests/Squid.Tentacle.Tests/Squid.Tentacle.Tests.csproj --configfile "$env:NUGET_CONFIG"

      - name: Run Squid.Tentacle.Tests
        shell: pwsh
        run: |
          $filter = if ("${{ github.event.inputs.test_filter }}") { "${{ github.event.inputs.test_filter }}" } else { "Category=WindowsTentacleE2E" }
          dotnet test tests/Squid.Tentacle.Tests/Squid.Tentacle.Tests.csproj `
            --configuration Release --no-restore `
            --filter $filter `
            --logger "console;verbosity=normal"

      - name: Restore Squid.WindowsUpgradeE2ETests
        shell: pwsh
        run: dotnet restore tests/Squid.WindowsUpgradeE2ETests/Squid.WindowsUpgradeE2ETests.csproj --configfile "$env:NUGET_CONFIG"

      - name: Run Squid.WindowsUpgradeE2ETests
        shell: pwsh
        run: |
          $filter = if ("${{ github.event.inputs.upgrade_test_filter }}") { "${{ github.event.inputs.upgrade_test_filter }}" } else { "Category=WindowsUpgradeWrapperE2E|Category=WindowsUpgradeServiceE2E|Category=WindowsUpgradeShaVerifyE2E|Category=WindowsServiceHostE2E|Category=StubSquidServerE2E|Category=TentacleRegisterE2E|Category=TentacleDeployE2E" }
          dotnet test tests/Squid.WindowsUpgradeE2ETests/Squid.WindowsUpgradeE2ETests.csproj `
            --configuration Release --no-restore `
            --filter $filter `
            --logger "console;verbosity=normal"
