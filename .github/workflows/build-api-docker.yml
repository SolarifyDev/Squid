name: Build API Docker

on:
  push:
    branches: [main]
    tags: ['*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag for the Docker image (overrides auto-generated tag)'
        required: false

permissions:
  contents: read

# Serialize runs per-ref so parallel "push main" + "push tag" runs on the same
# commit cannot race at Docker-Hub push. See commit history of
# build-publish-linux-tentacle.yml for the incident that prompted this.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  DOCKER_HUB: ${{ vars.DOCKER_HUB }}
  DOCKER_NAME: ${{ vars.DOCKER_NAME }}
  EXPECTED_SHA: ${{ github.sha }}

jobs:
  resolve-tag:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0   # full history for GitVersion

      - name: Verify checkout matches event SHA
        run: |
          ACTUAL=$(git rev-parse HEAD)
          if [ "$ACTUAL" != "$EXPECTED_SHA" ]; then
            echo "::error::Checkout SHA mismatch. Expected $EXPECTED_SHA, got $ACTUAL"
            exit 1
          fi
          echo "Checkout SHA verified: $ACTUAL"

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v3.2.1
        with:
          versionSpec: '6.x'

      - name: Run GitVersion
        id: gitversion
        uses: gittools/actions/gitversion/execute@v3.2.1

      - name: Generate image tag
        id: tag
        env:
          INPUT_VERSION: ${{ inputs.version }}
          GITVERSION_FULL: ${{ steps.gitversion.outputs.fullSemVer }}
        run: |
          if [ -n "$INPUT_VERSION" ]; then
            RAW="$INPUT_VERSION"
          else
            RAW="$GITVERSION_FULL"
          fi
          # Replace + with - for valid Docker tag
          TAG="${RAW//+/-}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

  build:
    runs-on: ubuntu-latest
    needs: resolve-tag
    strategy:
      fail-fast: false
      matrix:
        platform: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - name: Verify checkout matches event SHA
        run: |
          ACTUAL=$(git rev-parse HEAD)
          if [ "$ACTUAL" != "$EXPECTED_SHA" ]; then
            echo "::error::Checkout SHA mismatch. Expected $EXPECTED_SHA, got $ACTUAL"
            exit 1
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Prune builder cache before arm64 build to free disk space for QEMU emulation
      - name: Docker builder prune
        if: matrix.platform == 'arm64'
        run: docker builder prune --all --force 2>/dev/null || true

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.Api
          platforms: linux/${{ matrix.platform }}
          push: true
          tags: ${{ env.DOCKER_HUB }}/${{ env.DOCKER_NAME }}:${{ needs.resolve-tag.outputs.image_tag }}-${{ matrix.platform }}
          provenance: false
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ needs.resolve-tag.outputs.image_tag }}
          no-cache: true
          pull: true

      - name: Verify pushed image provenance
        run: |
          IMAGE="${{ env.DOCKER_HUB }}/${{ env.DOCKER_NAME }}:${{ needs.resolve-tag.outputs.image_tag }}-${{ matrix.platform }}"
          docker pull "$IMAGE"
          LABEL_SHA=$(docker inspect "$IMAGE" --format '{{ index .Config.Labels "org.opencontainers.image.revision" }}')
          if [ "$LABEL_SHA" != "$EXPECTED_SHA" ]; then
            echo "::error::Image label SHA $LABEL_SHA != expected $EXPECTED_SHA — stale image pushed!"
            exit 1
          fi
          echo "Image SHA label verified: $LABEL_SHA"

  manifest:
    runs-on: ubuntu-latest
    needs: [resolve-tag, build]
    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # NOTE: Platform suffixes below must match the matrix.platform values in the build job
      - name: Create and push versioned manifest
        env:
          IMAGE_TAG: ${{ needs.resolve-tag.outputs.image_tag }}
        run: |
          docker manifest create \
            ${{ env.DOCKER_HUB }}/${{ env.DOCKER_NAME }}:${IMAGE_TAG} \
            ${{ env.DOCKER_HUB }}/${{ env.DOCKER_NAME }}:${IMAGE_TAG}-amd64 \
            ${{ env.DOCKER_HUB }}/${{ env.DOCKER_NAME }}:${IMAGE_TAG}-arm64
          docker manifest push ${{ env.DOCKER_HUB }}/${{ env.DOCKER_NAME }}:${IMAGE_TAG}

      # :latest only on tag pushes — see comment in build-publish-linux-tentacle.yml.
      - name: Amend latest tag (tag pushes only)
        if: startsWith(github.ref, 'refs/tags/')
        env:
          IMAGE_TAG: ${{ needs.resolve-tag.outputs.image_tag }}
        run: |
          docker manifest create --amend \
            ${{ env.DOCKER_HUB }}/${{ env.DOCKER_NAME }}:latest \
            ${{ env.DOCKER_HUB }}/${{ env.DOCKER_NAME }}:${IMAGE_TAG}-amd64 \
            ${{ env.DOCKER_HUB }}/${{ env.DOCKER_NAME }}:${IMAGE_TAG}-arm64
          docker manifest push ${{ env.DOCKER_HUB }}/${{ env.DOCKER_NAME }}:latest
