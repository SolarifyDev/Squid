name: Build API Docker

on:
  push:
    branches: [main]
    tags: ['*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag for the Docker image (overrides auto-generated tag)'
        required: false

permissions:
  contents: read

env:
  DOCKER_HUB: ${{ vars.DOCKER_HUB }}
  DOCKER_NAME: ${{ vars.DOCKER_NAME }}

jobs:
  resolve-tag:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so git describe can find the latest tag

      - name: Generate image tag
        id: tag
        env:
          INPUT_VERSION: ${{ inputs.version }}
          GIT_REF: ${{ github.ref }}
          GIT_REF_NAME: ${{ github.ref_name }}
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          if [ -n "$INPUT_VERSION" ]; then
            RAW="$INPUT_VERSION"
          elif [[ "$GIT_REF" == refs/tags/* ]]; then
            # Tag push: use tag name directly (e.g. 1.2.4)
            RAW="$GIT_REF_NAME"
          else
            # Main branch push: auto-increment patch from latest tag
            # e.g. latest tag 1.2.4 → next version 1.2.5-<run_number>
            BASE=$(git describe --tags --abbrev=0 2>/dev/null || echo "0.0.0")
            # Strip optional 'v' prefix and any pre-release suffix (e.g. v1.2.4-rc1 → 1.2.4)
            CLEAN="${BASE#v}"
            CLEAN="${CLEAN%%-*}"
            IFS='.' read -r MAJOR MINOR PATCH <<< "$CLEAN"
            NEXT="${MAJOR:-0}.${MINOR:-0}.$((${PATCH:-0} + 1))"
            RAW="${NEXT}-${RUN_NUMBER}"
          fi
          # Replace + with - for valid Docker tag
          TAG="${RAW//+/-}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

  build:
    runs-on: ubuntu-latest
    needs: resolve-tag
    strategy:
      fail-fast: false
      matrix:
        platform: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Prune builder cache before arm64 build to free disk space for QEMU emulation
      - name: Docker builder prune
        if: matrix.platform == 'arm64'
        run: docker builder prune --all --force 2>/dev/null || true

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.Api
          platforms: linux/${{ matrix.platform }}
          push: true
          tags: ${{ env.DOCKER_HUB }}/${{ env.DOCKER_NAME }}:${{ needs.resolve-tag.outputs.image_tag }}-${{ matrix.platform }}
          provenance: false

  manifest:
    runs-on: ubuntu-latest
    needs: [resolve-tag, build]
    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # NOTE: Platform suffixes below must match the matrix.platform values in the build job
      - name: Create and push manifest
        env:
          IMAGE_TAG: ${{ needs.resolve-tag.outputs.image_tag }}
        run: |
          docker manifest create \
            ${{ env.DOCKER_HUB }}/${{ env.DOCKER_NAME }}:${IMAGE_TAG} \
            ${{ env.DOCKER_HUB }}/${{ env.DOCKER_NAME }}:${IMAGE_TAG}-amd64 \
            ${{ env.DOCKER_HUB }}/${{ env.DOCKER_NAME }}:${IMAGE_TAG}-arm64
          docker manifest push ${{ env.DOCKER_HUB }}/${{ env.DOCKER_NAME }}:${IMAGE_TAG}
