name: Build API Docker

on:
  push:
    branches: [main]
    tags: ['*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag for the Docker image (overrides auto-generated tag)'
        required: false

permissions:
  contents: read

env:
  DOCKER_HUB: ${{ vars.DOCKER_HUB }}
  DOCKER_NAME: ${{ vars.DOCKER_NAME }}

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        platform: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Generate image tag
        id: tag
        env:
          INPUT_VERSION: ${{ inputs.version }}
          GIT_REF: ${{ github.ref }}
          GIT_REF_NAME: ${{ github.ref_name }}
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          if [ -n "$INPUT_VERSION" ]; then
            RAW="$INPUT_VERSION"
          elif [[ "$GIT_REF" == refs/tags/* ]]; then
            RAW="$GIT_REF_NAME"
          else
            RAW="${GIT_REF_NAME}-${RUN_NUMBER}"
          fi
          # Replicate TeamCity: replace + with - for valid Docker tag
          TAG="${RAW//+/-}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      # Prune builder cache before arm64 build to free disk space for QEMU emulation
      - name: Docker builder prune
        if: matrix.platform == 'arm64'
        run: docker builder prune --all --force 2>/dev/null || true

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.Api
          platforms: linux/${{ matrix.platform }}
          push: true
          tags: ${{ env.DOCKER_HUB }}/${{ env.DOCKER_NAME }}:${{ steps.tag.outputs.tag }}-${{ matrix.platform }}
          provenance: false

  manifest:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Generate image tag
        id: tag
        env:
          INPUT_VERSION: ${{ inputs.version }}
          GIT_REF: ${{ github.ref }}
          GIT_REF_NAME: ${{ github.ref_name }}
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          if [ -n "$INPUT_VERSION" ]; then
            RAW="$INPUT_VERSION"
          elif [[ "$GIT_REF" == refs/tags/* ]]; then
            RAW="$GIT_REF_NAME"
          else
            RAW="${GIT_REF_NAME}-${RUN_NUMBER}"
          fi
          TAG="${RAW//+/-}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      # NOTE: Platform suffixes below must match the matrix.platform values in the build job
      - name: Create and push manifest
        run: |
          docker manifest create \
            ${{ env.DOCKER_HUB }}/${{ env.DOCKER_NAME }}:${{ steps.tag.outputs.tag }} \
            ${{ env.DOCKER_HUB }}/${{ env.DOCKER_NAME }}:${{ steps.tag.outputs.tag }}-amd64 \
            ${{ env.DOCKER_HUB }}/${{ env.DOCKER_NAME }}:${{ steps.tag.outputs.tag }}-arm64
          docker manifest push ${{ env.DOCKER_HUB }}/${{ env.DOCKER_NAME }}:${{ steps.tag.outputs.tag }}
