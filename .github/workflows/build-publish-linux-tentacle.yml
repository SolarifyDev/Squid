name: Build & Publish Linux Tentacle

on:
  push:
    branches: [main]
    tags: ['*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag for the Docker images (overrides auto-generated tag)'
        required: false

permissions:
  contents: write

env:
  DOCKER_HUB: ${{ vars.SQUID_DOCKER_HUB }}

jobs:
  # ── Step 1: Resolve version tag via GitVersion ─────────────────────────
  resolve-tag:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v3.2.1
        with:
          versionSpec: '6.x'

      - name: Run GitVersion
        id: gitversion
        uses: gittools/actions/gitversion/execute@v3.2.1

      - name: Generate image tag
        id: tag
        env:
          INPUT_VERSION: ${{ inputs.version }}
          GITVERSION_FULL: ${{ steps.gitversion.outputs.fullSemVer }}
        run: |
          if [ -n "$INPUT_VERSION" ]; then
            RAW="$INPUT_VERSION"
          else
            RAW="$GITVERSION_FULL"
          fi
          # Replace + with - for valid Docker tag
          TAG="${RAW//+/-}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

  # ── Step 2a: Build squid-tentacle-linux Docker (amd64 + arm64) ─────────
  build-docker:
    runs-on: ubuntu-latest
    needs: resolve-tag
    strategy:
      fail-fast: false
      matrix:
        platform: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.SQUID_DOCKER_USERNAME }}
          password: ${{ secrets.SQUID_DOCKER_PASSWORD }}

      - name: Docker builder prune
        if: matrix.platform == 'arm64'
        run: docker builder prune --all --force 2>/dev/null || true

      - name: Build and push squid-tentacle-linux
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.Tentacle.Linux
          platforms: linux/${{ matrix.platform }}
          push: true
          tags: ${{ env.DOCKER_HUB }}/squid-tentacle-linux:${{ needs.resolve-tag.outputs.image_tag }}-${{ matrix.platform }}
          provenance: false

  # ── Step 3: Create multi-arch manifest ─────────────────────────────────
  manifest:
    runs-on: ubuntu-latest
    needs: [resolve-tag, build-docker]
    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.SQUID_DOCKER_USERNAME }}
          password: ${{ secrets.SQUID_DOCKER_PASSWORD }}

      - name: Create and push squid-tentacle-linux manifest
        env:
          IMAGE_TAG: ${{ needs.resolve-tag.outputs.image_tag }}
        run: |
          docker manifest create \
            ${{ env.DOCKER_HUB }}/squid-tentacle-linux:${IMAGE_TAG} \
            ${{ env.DOCKER_HUB }}/squid-tentacle-linux:${IMAGE_TAG}-amd64 \
            ${{ env.DOCKER_HUB }}/squid-tentacle-linux:${IMAGE_TAG}-arm64
          docker manifest push ${{ env.DOCKER_HUB }}/squid-tentacle-linux:${IMAGE_TAG}

  # ── Step 2b: Build self-contained binaries → tar.gz (parallel with Docker) ─
  build-binary:
    runs-on: ubuntu-latest
    needs: resolve-tag
    env:
      NUGET_CONFIG: ${{ github.workspace }}/NuGet.Config
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: linux-x64
            arch_label: amd64
          - rid: linux-arm64
            arch_label: arm64
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Disable unreachable NuGet source
        run: dotnet nuget disable source SJ.Nuget --configfile "$NUGET_CONFIG"

      - name: Publish Squid.Tentacle (self-contained)
        run: |
          dotnet publish src/Squid.Tentacle/Squid.Tentacle.csproj \
            -c Release -r ${{ matrix.rid }} --self-contained true \
            -p:PublishSingleFile=true \
            -p:Version="${{ needs.resolve-tag.outputs.image_tag }}" \
            -o dist/${{ matrix.rid }}

      - name: Publish Squid.Calamari (self-contained)
        run: |
          dotnet publish src/Squid.Calamari/Squid.Calamari.csproj \
            -c Release -r ${{ matrix.rid }} --self-contained true \
            -o dist/${{ matrix.rid }}

      - name: Create tar.gz archive
        env:
          IMAGE_TAG: ${{ needs.resolve-tag.outputs.image_tag }}
        run: |
          tar czf dist/squid-tentacle-${IMAGE_TAG}-${{ matrix.rid }}.tar.gz \
            -C dist/${{ matrix.rid }} .
          cp dist/squid-tentacle-${IMAGE_TAG}-${{ matrix.rid }}.tar.gz \
            dist/squid-tentacle-${{ matrix.rid }}.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: squid-tentacle-${{ matrix.rid }}
          path: dist/squid-tentacle-*${{ matrix.rid }}.tar.gz

  # ── Step 4: Upload tar.gz to GitHub Releases (tag-only) ───────────────
  release:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    needs: [resolve-tag, build-binary]
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4.3.0
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Linux Tentacle ${{ needs.resolve-tag.outputs.image_tag }}
          files: artifacts/squid-tentacle-*.tar.gz
          generate_release_notes: true
