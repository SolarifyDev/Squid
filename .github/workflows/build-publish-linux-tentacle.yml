name: Build & Publish Linux Tentacle

on:
  push:
    branches: [main]
    tags: ['*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag for the Docker images (overrides auto-generated tag)'
        required: false

permissions:
  contents: write

# Serialize runs per-ref so a "push main" run and a "push tag" run on the same
# commit cannot race at the Docker-Hub push step. Without this the later push
# wins and can overwrite :latest with a stale build from the earlier run.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  DOCKER_HUB: ${{ vars.SQUID_DOCKER_HUB }}
  # Single source of truth — every checkout + all verification steps read this.
  # Pinning to github.sha (immutable commit) instead of github.ref avoids the
  # "tag points to stale commit" race we hit on 1.3.2.
  EXPECTED_SHA: ${{ github.sha }}

jobs:
  # ── Step 1: Resolve version tag via GitVersion ─────────────────────────
  resolve-tag:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0

      - name: Verify checkout matches event SHA
        run: |
          ACTUAL=$(git rev-parse HEAD)
          if [ "$ACTUAL" != "$EXPECTED_SHA" ]; then
            echo "::error::Checkout SHA mismatch. Expected $EXPECTED_SHA, got $ACTUAL"
            exit 1
          fi
          echo "Checkout SHA verified: $ACTUAL"

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v3.2.1
        with:
          versionSpec: '6.x'

      - name: Run GitVersion
        id: gitversion
        uses: gittools/actions/gitversion/execute@v3.2.1

      - name: Generate image tag
        id: tag
        env:
          INPUT_VERSION: ${{ inputs.version }}
          GITVERSION_FULL: ${{ steps.gitversion.outputs.fullSemVer }}
        run: |
          if [ -n "$INPUT_VERSION" ]; then
            RAW="$INPUT_VERSION"
          else
            RAW="$GITVERSION_FULL"
          fi
          # Replace + with - for valid Docker tag
          TAG="${RAW//+/-}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

  # ── Step 2a: Build squid-tentacle-linux Docker (amd64 + arm64) ─────────
  build-docker:
    runs-on: ubuntu-latest
    needs: resolve-tag
    strategy:
      fail-fast: false
      matrix:
        platform: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - name: Verify checkout matches event SHA
        run: |
          ACTUAL=$(git rev-parse HEAD)
          if [ "$ACTUAL" != "$EXPECTED_SHA" ]; then
            echo "::error::Checkout SHA mismatch. Expected $EXPECTED_SHA, got $ACTUAL"
            exit 1
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.SQUID_DOCKER_USERNAME }}
          password: ${{ secrets.SQUID_DOCKER_PASSWORD }}

      - name: Docker builder prune
        if: matrix.platform == 'arm64'
        run: docker builder prune --all --force 2>/dev/null || true

      - name: Build and push squid-tentacle-linux
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.Tentacle.Linux
          platforms: linux/${{ matrix.platform }}
          push: true
          tags: ${{ env.DOCKER_HUB }}/squid-tentacle-linux:${{ needs.resolve-tag.outputs.image_tag }}-${{ matrix.platform }}
          provenance: false
          # Bake the commit SHA into the image labels so we can verify provenance.
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ needs.resolve-tag.outputs.image_tag }}
          no-cache: true
          pull: true

      # Belt-and-suspenders: pull the image we just pushed and sanity-check that
      # the binary came from this commit (not a stale cached layer or a ghost
      # from a previous run). If this fails, something very bad happened in the
      # build stage and we must NOT proceed to the manifest/latest step.
      - name: Verify pushed image provenance
        run: |
          IMAGE="${{ env.DOCKER_HUB }}/squid-tentacle-linux:${{ needs.resolve-tag.outputs.image_tag }}-${{ matrix.platform }}"
          docker pull "$IMAGE"
          LABEL_SHA=$(docker inspect "$IMAGE" --format '{{ index .Config.Labels "org.opencontainers.image.revision" }}')
          if [ "$LABEL_SHA" != "$EXPECTED_SHA" ]; then
            echo "::error::Image label SHA $LABEL_SHA != expected $EXPECTED_SHA — stale image pushed!"
            exit 1
          fi
          echo "Image SHA label verified: $LABEL_SHA"

  # ── Step 3: Create multi-arch manifest ─────────────────────────────────
  manifest:
    runs-on: ubuntu-latest
    needs: [resolve-tag, build-docker]
    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.SQUID_DOCKER_USERNAME }}
          password: ${{ secrets.SQUID_DOCKER_PASSWORD }}

      - name: Create and push versioned manifest
        env:
          IMAGE_TAG: ${{ needs.resolve-tag.outputs.image_tag }}
        run: |
          docker manifest create \
            ${{ env.DOCKER_HUB }}/squid-tentacle-linux:${IMAGE_TAG} \
            ${{ env.DOCKER_HUB }}/squid-tentacle-linux:${IMAGE_TAG}-amd64 \
            ${{ env.DOCKER_HUB }}/squid-tentacle-linux:${IMAGE_TAG}-arm64
          docker manifest push ${{ env.DOCKER_HUB }}/squid-tentacle-linux:${IMAGE_TAG}

      # :latest is ONLY updated on tag pushes. The "push main" trigger builds
      # and publishes a versioned image (e.g. 1.3.2-20) for traceability but
      # must not clobber :latest — otherwise a later "push main" run can race
      # a "push tag" run on the same commit and overwrite :latest with a stale
      # build (as happened on 1.3.2 where :latest ended up pointing at a
      # pre-tag-1.3.2 binary).
      - name: Amend latest tag (tag pushes only)
        if: startsWith(github.ref, 'refs/tags/')
        env:
          IMAGE_TAG: ${{ needs.resolve-tag.outputs.image_tag }}
        run: |
          docker manifest create --amend \
            ${{ env.DOCKER_HUB }}/squid-tentacle-linux:latest \
            ${{ env.DOCKER_HUB }}/squid-tentacle-linux:${IMAGE_TAG}-amd64 \
            ${{ env.DOCKER_HUB }}/squid-tentacle-linux:${IMAGE_TAG}-arm64
          docker manifest push ${{ env.DOCKER_HUB }}/squid-tentacle-linux:latest

  # ── Step 2b: Build self-contained binaries → tar.gz (parallel with Docker) ─
  build-binary:
    runs-on: ubuntu-latest
    needs: resolve-tag
    env:
      NUGET_CONFIG: ${{ github.workspace }}/NuGet.Config
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: linux-x64
            arch_label: amd64
          - rid: linux-arm64
            arch_label: arm64
          # D2 (1.6.0): Alpine / musl-libc support. Alpine's libc is musl,
          # NOT glibc — a `linux-x64` self-contained .NET binary crashes
          # at startup with "Error relocating ...: symbol not found" on
          # Alpine. `linux-musl-x64` is .NET's officially-supported RID
          # for musl builds. Same tarball + distribution layout as the
          # glibc builds; install-tentacle.sh picks the right RID by
          # probing `ldd --version` (musl vs glibc).
          - rid: linux-musl-x64
            arch_label: musl-x64
          - rid: linux-musl-arm64
            arch_label: musl-arm64
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - name: Verify checkout matches event SHA
        run: |
          ACTUAL=$(git rev-parse HEAD)
          if [ "$ACTUAL" != "$EXPECTED_SHA" ]; then
            echo "::error::Checkout SHA mismatch. Expected $EXPECTED_SHA, got $ACTUAL"
            exit 1
          fi

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Disable unreachable NuGet source
        run: dotnet nuget disable source SJ.Nuget --configfile "$NUGET_CONFIG"

      - name: Publish Squid.Tentacle (self-contained)
        run: |
          dotnet publish src/Squid.Tentacle/Squid.Tentacle.csproj \
            -c Release -r ${{ matrix.rid }} --self-contained true \
            -p:PublishSingleFile=true \
            -p:Version="${{ needs.resolve-tag.outputs.image_tag }}" \
            -o dist/${{ matrix.rid }}

      - name: Publish Squid.Calamari (self-contained)
        run: |
          dotnet publish src/Squid.Calamari/Squid.Calamari.csproj \
            -c Release -r ${{ matrix.rid }} --self-contained true \
            -o dist/${{ matrix.rid }}

      - name: Create tar.gz archive
        env:
          IMAGE_TAG: ${{ needs.resolve-tag.outputs.image_tag }}
        run: |
          tar czf dist/squid-tentacle-${IMAGE_TAG}-${{ matrix.rid }}.tar.gz \
            -C dist/${{ matrix.rid }} .
          cp dist/squid-tentacle-${IMAGE_TAG}-${{ matrix.rid }}.tar.gz \
            dist/squid-tentacle-${{ matrix.rid }}.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name: squid-tentacle-${{ matrix.rid }}
          path: dist/squid-tentacle-*${{ matrix.rid }}.tar.gz

  # ── Step 4: Upload tar.gz to GitHub Releases (tag-only) ───────────────
  release:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    needs: [resolve-tag, build-binary]
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: squid-tentacle-*
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Squid Tentacle v${{ needs.resolve-tag.outputs.image_tag }}
          prerelease: ${{ contains(needs.resolve-tag.outputs.image_tag, '-') }}
          files: artifacts/squid-tentacle-*.tar.gz
          generate_release_notes: true
          body: |
            ## Squid Tentacle v${{ needs.resolve-tag.outputs.image_tag }}

            Self-contained Linux deployment agent binaries (x64 + arm64).

            ### Installation

            **One-liner (latest):**
            ```bash
            curl -fsSL https://raw.githubusercontent.com/SolarifyDev/Squid/main/deploy/scripts/install-tentacle.sh | sudo bash
            ```

            **Specific version:**
            ```bash
            curl -fsSL https://raw.githubusercontent.com/SolarifyDev/Squid/main/deploy/scripts/install-tentacle.sh | sudo bash -s -- --version ${{ needs.resolve-tag.outputs.image_tag }}
            ```

            **Docker:**
            ```bash
            docker pull ${{ env.DOCKER_HUB }}/squid-tentacle-linux:${{ needs.resolve-tag.outputs.image_tag }}
            ```

            ### Downloads

            | Platform | Architecture | Archive |
            |----------|-------------|---------|
            | Linux (glibc) | x64 | `squid-tentacle-${{ needs.resolve-tag.outputs.image_tag }}-linux-x64.tar.gz` |
            | Linux (glibc) | arm64 | `squid-tentacle-${{ needs.resolve-tag.outputs.image_tag }}-linux-arm64.tar.gz` |
            | Linux (musl / Alpine) | x64 | `squid-tentacle-${{ needs.resolve-tag.outputs.image_tag }}-linux-musl-x64.tar.gz` |
            | Linux (musl / Alpine) | arm64 | `squid-tentacle-${{ needs.resolve-tag.outputs.image_tag }}-linux-musl-arm64.tar.gz` |

            See [CHANGELOG](https://github.com/SolarifyDev/Squid/compare/) for commit history.
