name: Integration Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  integration-tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: "123456"
          POSTGRES_DB: squid
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore tests/Squid.IntegrationTests/Squid.IntegrationTests.csproj

      - name: Build
        run: dotnet build tests/Squid.IntegrationTests/Squid.IntegrationTests.csproj --no-restore

      - name: Run Integration Tests
        run: dotnet test tests/Squid.IntegrationTests/Squid.IntegrationTests.csproj --no-build --verbosity normal
