name: Build & Publish Kubernetes Agent

on:
  push:
    branches: [main]
    tags: ['*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag for the Docker images (overrides auto-generated tag)'
        required: false

permissions:
  contents: read

# Serialize parallel "push main" + "push tag" runs on the same commit to
# prevent races at the Docker Hub push step.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  DOCKER_HUB: ${{ vars.SQUID_DOCKER_HUB }}
  EXPECTED_SHA: ${{ github.sha }}

jobs:
  # ── Step 1: Resolve version tag via GitVersion ─────────────────────────
  resolve-tag:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0

      - name: Verify checkout matches event SHA
        run: |
          ACTUAL=$(git rev-parse HEAD)
          if [ "$ACTUAL" != "$EXPECTED_SHA" ]; then
            echo "::error::Checkout SHA mismatch. Expected $EXPECTED_SHA, got $ACTUAL"
            exit 1
          fi
          echo "Checkout SHA verified: $ACTUAL"

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v3.2.1
        with:
          versionSpec: '6.x'

      - name: Run GitVersion
        id: gitversion
        uses: gittools/actions/gitversion/execute@v3.2.1

      - name: Generate image tag
        id: tag
        env:
          INPUT_VERSION: ${{ inputs.version }}
          GITVERSION_FULL: ${{ steps.gitversion.outputs.fullSemVer }}
        run: |
          if [ -n "$INPUT_VERSION" ]; then
            RAW="$INPUT_VERSION"
          else
            RAW="$GITVERSION_FULL"
          fi
          # Replace + with - for valid Docker tag
          TAG="${RAW//+/-}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

  # ── Step 2a: Build squid-tentacle (amd64 + arm64) ─────────────────────
  build-tentacle:
    runs-on: ubuntu-latest
    needs: resolve-tag
    strategy:
      fail-fast: false
      matrix:
        platform: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - name: Verify checkout matches event SHA
        run: |
          ACTUAL=$(git rev-parse HEAD)
          if [ "$ACTUAL" != "$EXPECTED_SHA" ]; then
            echo "::error::Checkout SHA mismatch. Expected $EXPECTED_SHA, got $ACTUAL"
            exit 1
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.SQUID_DOCKER_USERNAME }}
          password: ${{ secrets.SQUID_DOCKER_PASSWORD }}

      - name: Docker builder prune
        if: matrix.platform == 'arm64'
        run: docker builder prune --all --force 2>/dev/null || true

      - name: Build and push squid-tentacle
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.Tentacle
          platforms: linux/${{ matrix.platform }}
          push: true
          tags: ${{ env.DOCKER_HUB }}/squid-tentacle:${{ needs.resolve-tag.outputs.image_tag }}-${{ matrix.platform }}
          provenance: false
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ needs.resolve-tag.outputs.image_tag }}
          no-cache: true
          pull: true

      - name: Verify pushed squid-tentacle image provenance
        run: |
          IMAGE="${{ env.DOCKER_HUB }}/squid-tentacle:${{ needs.resolve-tag.outputs.image_tag }}-${{ matrix.platform }}"
          docker pull "$IMAGE"
          LABEL_SHA=$(docker inspect "$IMAGE" --format '{{ index .Config.Labels "org.opencontainers.image.revision" }}')
          if [ "$LABEL_SHA" != "$EXPECTED_SHA" ]; then
            echo "::error::Image label SHA $LABEL_SHA != expected $EXPECTED_SHA"
            exit 1
          fi

  # ── Step 2b: Build squid-watchdog (amd64 + arm64) ─────────────────────
  build-watchdog:
    runs-on: ubuntu-latest
    needs: resolve-tag
    strategy:
      fail-fast: false
      matrix:
        platform: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - name: Verify checkout matches event SHA
        run: |
          ACTUAL=$(git rev-parse HEAD)
          if [ "$ACTUAL" != "$EXPECTED_SHA" ]; then
            echo "::error::Checkout SHA mismatch. Expected $EXPECTED_SHA, got $ACTUAL"
            exit 1
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.SQUID_DOCKER_USERNAME }}
          password: ${{ secrets.SQUID_DOCKER_PASSWORD }}

      - name: Docker builder prune
        if: matrix.platform == 'arm64'
        run: docker builder prune --all --force 2>/dev/null || true

      - name: Build and push squid-watchdog
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.Tentacle.Watchdog
          platforms: linux/${{ matrix.platform }}
          push: true
          tags: ${{ env.DOCKER_HUB }}/squid-watchdog:${{ needs.resolve-tag.outputs.image_tag }}-${{ matrix.platform }}
          provenance: false
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ needs.resolve-tag.outputs.image_tag }}
          no-cache: true
          pull: true

      - name: Verify pushed squid-watchdog image provenance
        run: |
          IMAGE="${{ env.DOCKER_HUB }}/squid-watchdog:${{ needs.resolve-tag.outputs.image_tag }}-${{ matrix.platform }}"
          docker pull "$IMAGE"
          LABEL_SHA=$(docker inspect "$IMAGE" --format '{{ index .Config.Labels "org.opencontainers.image.revision" }}')
          if [ "$LABEL_SHA" != "$EXPECTED_SHA" ]; then
            echo "::error::Image label SHA $LABEL_SHA != expected $EXPECTED_SHA"
            exit 1
          fi

  # ── Step 2c: Build nfs-server (amd64 + arm64) ─────────────────────────
  build-nfs-server:
    runs-on: ubuntu-latest
    needs: resolve-tag
    strategy:
      fail-fast: false
      matrix:
        platform: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - name: Verify checkout matches event SHA
        run: |
          ACTUAL=$(git rev-parse HEAD)
          if [ "$ACTUAL" != "$EXPECTED_SHA" ]; then
            echo "::error::Checkout SHA mismatch. Expected $EXPECTED_SHA, got $ACTUAL"
            exit 1
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.SQUID_DOCKER_USERNAME }}
          password: ${{ secrets.SQUID_DOCKER_PASSWORD }}

      - name: Docker builder prune
        if: matrix.platform == 'arm64'
        run: docker builder prune --all --force 2>/dev/null || true

      - name: Build and push nfs-server
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.NfsServer
          platforms: linux/${{ matrix.platform }}
          push: true
          tags: ${{ env.DOCKER_HUB }}/nfs-server:${{ needs.resolve-tag.outputs.image_tag }}-${{ matrix.platform }}
          provenance: false
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ needs.resolve-tag.outputs.image_tag }}
          no-cache: true
          pull: true

  # ── Step 3: Create multi-arch manifests ────────────────────────────────
  manifest:
    runs-on: ubuntu-latest
    needs: [resolve-tag, build-tentacle, build-watchdog, build-nfs-server]
    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.SQUID_DOCKER_USERNAME }}
          password: ${{ secrets.SQUID_DOCKER_PASSWORD }}

      - name: Create and push versioned manifests
        env:
          IMAGE_TAG: ${{ needs.resolve-tag.outputs.image_tag }}
        run: |
          for repo in squid-tentacle squid-watchdog nfs-server; do
            docker manifest create \
              ${{ env.DOCKER_HUB }}/${repo}:${IMAGE_TAG} \
              ${{ env.DOCKER_HUB }}/${repo}:${IMAGE_TAG}-amd64 \
              ${{ env.DOCKER_HUB }}/${repo}:${IMAGE_TAG}-arm64
            docker manifest push ${{ env.DOCKER_HUB }}/${repo}:${IMAGE_TAG}
          done

      # :latest only on tag pushes — see comment in build-publish-linux-tentacle.yml.
      - name: Amend latest tags (tag pushes only)
        if: startsWith(github.ref, 'refs/tags/')
        env:
          IMAGE_TAG: ${{ needs.resolve-tag.outputs.image_tag }}
        run: |
          for repo in squid-tentacle squid-watchdog nfs-server; do
            docker manifest create --amend \
              ${{ env.DOCKER_HUB }}/${repo}:latest \
              ${{ env.DOCKER_HUB }}/${repo}:${IMAGE_TAG}-amd64 \
              ${{ env.DOCKER_HUB }}/${repo}:${IMAGE_TAG}-arm64
            docker manifest push ${{ env.DOCKER_HUB }}/${repo}:latest
          done

  # ── Step 4: Helm package & push ────────────────────────────────────────
  helm:
    runs-on: ubuntu-latest
    needs: [resolve-tag, manifest]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - name: Verify checkout matches event SHA
        run: |
          ACTUAL=$(git rev-parse HEAD)
          if [ "$ACTUAL" != "$EXPECTED_SHA" ]; then
            echo "::error::Checkout SHA mismatch. Expected $EXPECTED_SHA, got $ACTUAL"
            exit 1
          fi

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Login to Docker Hub OCI registry
        env:
          DOCKER_USERNAME: ${{ secrets.SQUID_DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.SQUID_DOCKER_PASSWORD }}
        run: echo "$DOCKER_PASSWORD" | helm registry login registry-1.docker.io -u "$DOCKER_USERNAME" --password-stdin

      - name: Package and push Helm chart
        env:
          IMAGE_TAG: ${{ needs.resolve-tag.outputs.image_tag }}
        run: |
          cp -r deploy/helm/kubernetes-agent /tmp/kubernetes-agent
          sed -i "s/^version:.*/version: ${IMAGE_TAG}/" /tmp/kubernetes-agent/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${IMAGE_TAG}\"/" /tmp/kubernetes-agent/Chart.yaml
          helm package /tmp/kubernetes-agent/
          helm push kubernetes-agent-${IMAGE_TAG}.tgz oci://registry-1.docker.io/${{ env.DOCKER_HUB }}
          rm -f kubernetes-agent-${IMAGE_TAG}.tgz
