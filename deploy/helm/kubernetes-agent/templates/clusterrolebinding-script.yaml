{{- if not .Values.scriptPod.rbac.useNamespacedRoles }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "kubernetes-agent.fullname" . }}-script
  labels:
    {{- include "kubernetes-agent.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "kubernetes-agent.fullname" . }}-script
subjects:
- kind: ServiceAccount
  name: {{ include "kubernetes-agent.script-sa-name" . }}
  namespace: {{ .Release.Namespace }}
{{- end }}
