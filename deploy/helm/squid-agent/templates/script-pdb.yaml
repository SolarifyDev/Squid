{{- if .Values.scriptPod.disruptionBudgetEnabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "squid-agent.fullname" . }}-script
  labels:
    {{- include "squid-agent.labels" . | nindent 4 }}
spec:
  maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/managed-by: squid-agent
{{- end }}
