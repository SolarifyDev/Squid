apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "squid-agent.fullname" . }}-agent
  labels:
    {{- include "squid-agent.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "squid-agent.fullname" . }}-agent
subjects:
- kind: ServiceAccount
  name: {{ include "squid-agent.agent-sa-name" . }}
  namespace: {{ .Release.Namespace }}
