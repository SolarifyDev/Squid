apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "squid-agent.fullname" . }}
  labels:
    {{- include "squid-agent.labels" . | nindent 4 }}
    {{- with .Values.agent.metadata.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.agent.metadata.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "squid-agent.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "squid-agent.selectorLabels" . | nindent 8 }}
        {{- with .Values.agent.metadata.labels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.agent.metadata.annotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "squid-agent.agent-sa-name" . }}
      terminationGracePeriodSeconds: {{ .Values.agent.terminationGracePeriodSeconds }}
      containers:
      - name: squid-agent
        image: "{{ .Values.agent.image.repository }}:{{ .Values.agent.image.tag }}"
        imagePullPolicy: {{ .Values.agent.image.pullPolicy }}
        ports:
        - name: health
          containerPort: {{ .Values.agent.healthCheckPort }}
          protocol: TCP
        startupProbe:
          exec:
            command: ["test", "-f", "/squid/initialized"]
          failureThreshold: {{ .Values.agent.startupProbe.failureThreshold }}
          periodSeconds: {{ .Values.agent.startupProbe.periodSeconds }}
        livenessProbe:
          httpGet:
            path: /healthz
            port: health
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /readyz
            port: health
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        env:
        - name: Agent__ServerUrl
          value: "{{ .Values.agent.serverUrl }}"
        - name: Agent__ServerPollingPort
          value: "{{ .Values.agent.serverPollingPort }}"
        - name: Agent__BearerToken
          valueFrom:
            secretKeyRef:
              name: {{ include "squid-agent.fullname" . }}-secret
              key: bearer-token
        - name: Agent__Namespace
          value: "{{ .Values.agent.namespace }}"
        - name: Agent__Roles
          value: "{{ .Values.agent.roles }}"
        - name: Agent__AgentNamespace
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: Agent__PvcClaimName
          value: {{ include "squid-agent.pvc-name" . }}
        - name: Agent__ScriptPodImage
          value: "{{ .Values.scriptPod.image }}"
        - name: Agent__ScriptPodServiceAccount
          value: {{ include "squid-agent.script-sa-name" . }}
        - name: Agent__ScriptPodTimeoutSeconds
          value: "{{ .Values.scriptPod.timeoutSeconds }}"
        - name: Agent__ScriptPodCpuRequest
          value: "{{ .Values.scriptPod.cpuRequest }}"
        - name: Agent__ScriptPodMemoryRequest
          value: "{{ .Values.scriptPod.memoryRequest }}"
        - name: Agent__ScriptPodCpuLimit
          value: "{{ .Values.scriptPod.cpuLimit }}"
        - name: Agent__ScriptPodMemoryLimit
          value: "{{ .Values.scriptPod.memoryLimit }}"
        - name: Agent__UseScriptPods
          value: "true"
        - name: Agent__HealthCheckPort
          value: "{{ .Values.agent.healthCheckPort }}"
        - name: Agent__WorkspacePath
          value: "/squid/work"
        - name: Agent__CertsPath
          value: "/squid/certs"
        {{- if .Values.agent.serverCertificate }}
        - name: Agent__ServerCertificate
          value: "{{ .Values.agent.serverCertificate }}"
        {{- end }}
        resources:
          {{- toYaml .Values.agent.resources | nindent 10 }}
        volumeMounts:
        - name: workspace
          mountPath: /squid/work
        - name: certs
          mountPath: /squid/certs
      volumes:
      - name: workspace
        persistentVolumeClaim:
          claimName: {{ include "squid-agent.pvc-name" . }}
      - name: certs
        emptyDir: {}
      {{- with .Values.agent.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.agent.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
